# Shadows
shadow               = false;
shadow-radius        = 20;
shadow-spread        = 10;
shadow-offset-x      = -20;
shadow-offset-y      = -20;
shadow-opacity       = 0.4;

shadow-exclude = [
    "class_g = 'dmenu'",
    "class_g = 'spotify'",
    "_GTK_FRAME_EXTENTS@:c",
    "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'"
];

#Corners
corner-radius = 6;
rounded-corners-exclude = [
  "class_g = 'dwm'",
  "class_g = 'tray'"
];
round-borders = 1;
round-borders-exclude = [
  "class_g = 'tray'",
];

# Fading
fading = true;
fade-delta = 5;
fade-in-step = 0.056;
fade-out-step = 0.06;

# Other
experimental-backends  = true;
vsync                  = false;
dbe                    = false;
backend = "glx";
